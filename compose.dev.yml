services:
  db:
    image: postgres:18.3-alpine
    environment:
      POSTGRES_DB: reservation
      POSTGRES_USER: reservation
      POSTGRES_PASSWORD: reservation
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reservation -d reservation"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - app-db:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      target: dev
    env_file:
      - .env.dev.example
    environment:
      DATABASE_URL: postgres://reservation:reservation@db:5432/reservation
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      DJANGO_DEBUG: "true"
    command: >
      sh -c "uv run python manage.py migrate &&
             uv run python manage.py seed_demo &&
             uv run python manage.py runserver 0.0.0.0:8000"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      target: dev
    env_file:
      - .env.dev.example
    environment:
      API_INTERNAL_ORIGIN: http://api:8000/api/v1
      API_ORIGIN: http://localhost:8000/api/v1
      NEXTAUTH_URL: http://localhost:3000
    command: pnpm --filter @reservation/web dev
    depends_on:
      - api
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
      - web-node-modules:/workspace/node_modules
      - web-app-node-modules:/workspace/apps/web/node_modules

  authentik-postgresql:
    image: postgres:16-alpine
    env_file:
      - .env.dev.example
    environment:
      POSTGRES_DB: authentik
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: ${PG_PASS:-local-dev-authentik-db}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d authentik -U authentik"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - authentik-db:/var/lib/postgresql/data

  authentik-server:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_TAG:-2026.2.2}
    command: server
    env_file:
      - .env.dev.example
    environment:
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS:-local-dev-authentik-db}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:-local-dev-authentik-secret-key}
      AUTHENTIK_BOOTSTRAP_PASSWORD: local-dev-admin
      AUTHENTIK_BOOTSTRAP_EMAIL: admin@example.com
    depends_on:
      authentik-postgresql:
        condition: service_healthy
    ports:
      - "9000:9000"
      - "9443:9443"
    volumes:
      - authentik-media:/media
      - ./docker/authentik:/blueprints

  authentik-worker:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_TAG:-2026.2.2}
    command: worker
    env_file:
      - .env.dev.example
    environment:
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS:-local-dev-authentik-db}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:-local-dev-authentik-secret-key}
    depends_on:
      authentik-postgresql:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - authentik-media:/media
      - ./docker/authentik:/blueprints

volumes:
  app-db:
  authentik-db:
  authentik-media:
  web-node-modules:
  web-app-node-modules:
