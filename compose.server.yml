x-server-env: &server-env
  - path: ${SERVER_ENV_FILE:-.env.server}
    required: false

services:
  db:
    image: postgres:18.3-alpine
    env_file: *server-env
    environment:
      POSTGRES_DB: reservation
      POSTGRES_USER: reservation
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-replace-me}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reservation -d reservation"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - app-db:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      target: server
    env_file: *server-env
    command: >
      sh -c "uv run python manage.py migrate &&
             uv run gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      target: server
    env_file: *server-env
    environment:
      API_INTERNAL_ORIGIN: http://api:8000/api/v1
    depends_on:
      - api

  caddy:
    image: caddy:2.10-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - web
      - api

volumes:
  app-db:
  caddy-data:
  caddy-config:
