version: 1
metadata:
  name: Reservation MVP local OIDC
  labels:
    blueprints.goauthentik.io/instantiate: "true"
entries:
  - model: authentik_core.group
    id: reservation-admins
    identifiers:
      name: reservation-admins
    attrs:
      name: reservation-admins
  - model: authentik_core.group
    id: reservation-users
    identifiers:
      name: reservation-users
    attrs:
      name: reservation-users
  - model: authentik_core.application
    id: reservation-mvp-app
    identifiers:
      slug: reservation-mvp
    attrs:
      name: Reservation MVP
      slug: reservation-mvp
  - model: authentik_providers_oauth2.oauth2provider
    id: reservation-mvp-provider
    identifiers:
      name: Reservation MVP Provider
    attrs:
      name: Reservation MVP Provider
      client_type: confidential
      client_id: reservation-mvp
      client_secret: local-dev-client-secret
      redirect_uris:
        - matching_mode: strict
          url: http://localhost:3000/api/auth/callback/authentik
      signing_key:
        !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
  - model: authentik_core.application
    identifiers:
      slug: reservation-mvp
    attrs:
      provider: !KeyOf reservation-mvp-provider
